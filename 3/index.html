<!doctype html>
<html lang="ca">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animals</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header>
      <h1>Animals</h1>
    </header>
    <main>
        <section class="tars">
            <!-- Targeta 1 -->
            <div class="gir-tar">
                <input type="checkbox" id="animal1">
                <label for="animal1" class="gir-tar-inner">
                <div class="gir-tar-front">
                    <img src="assets/gat.png" alt="Gat">
                    <div class="nom">Gat</div>
                </div>
                <div class="gir-tar-darrere">
                    <p><strong>Alimentació:</strong> Carnívor</p>
                    <p><strong>Activitat:</strong> Nocturn</p>
                    <p><strong>Esperança de vida:</strong> 10 anys</p>
                </div>
                </label>
            </div>

            <!-- Targeta 2 -->
            <div class="gir-tar">
                <input type="checkbox" id="animal2">
                <label for="animal2" class="gir-tar-inner">
                <div class="gir-tar-front">
                    <img src="assets/conill.png" alt="Conill">
                    <div class="nom">Conill</div>
                </div>
                <div class="gir-tar-darrere">
                    <p><strong>Alimentació:</strong> Herbívor</p>
                    <p><strong>Activitat:</strong> Diürn</p>
                    <p><strong>Esperança de vida:</strong> 8 anys</p>
                </div>
                </label>
            </div>

            <!-- Targeta 3 -->
            <div class="gir-tar">
                <input type="checkbox" id="animal3">
                <label for="animal3" class="gir-tar-inner">
                <div class="gir-tar-front">
                    <img src="assets/guineu.png" alt="Guineu">
                    <div class="nom">Guineu</div>
                </div>
                <div class="gir-tar-darrere">
                    <p><strong>Alimentació:</strong> Carnívor</p>
                    <p><strong>Activitat:</strong> Nocturn</p>
                    <p><strong>Esperança de vida:</strong> 12 anys</p>
                </div>
                </label>
            </div>
        </section>
    </main>
  </body>
</html>
